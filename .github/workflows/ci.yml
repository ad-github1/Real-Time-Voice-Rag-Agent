name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Tests on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"

    env:
      PYTHONPATH: src
      VOICE_RAG_REASONER: template
      VOICE_RAG_RETRIEVER: bm25
      VOICE_RAG_ENABLE_TRACING: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system audio dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 portaudio19-dev

      - name: Install Python dependencies
        run: |
          python -m pip install setuptools wheel
          python -m pip install -e ".[api,ingestion,dev]"
          python -m pip install "assemblyai>=0.35" "cartesia[websockets]>=2.0" "sounddevice>=0.4"

      - name: Compile source files
        run: |
          python -m compileall -q src

      - name: Run tests
        run: |
          pytest tests -q
